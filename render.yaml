services:
  - type: web
    name: gumonitoring
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: groundup-db
          property: connectionString
      - key: JWT_SECRET
        value: ground-up-dev-secret-change-in-production
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: "*"
      - key: EWELINK_EMAIL
        value: grounduppune89@gmail.com
      - key: EWELINK_PASSWORD
        value: Groundup
      - key: EWELINK_REGION
        value: as

databases:
  - name: groundup-db
    databaseName: groundup
    user: groundup_user
