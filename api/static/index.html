<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ground Up Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F3F4F6; color: #111827; min-height: 100vh;
    }
    .page { padding: 20px; max-width: 500px; margin: 0 auto; }

    /* Header */
    .header { font-size: 30px; font-weight: bold; color: #111827; margin-bottom: 2px; }
    .subheader { font-size: 14px; color: #6B7280; margin-bottom: 24px; }
    .section-title { font-size: 16px; font-weight: bold; color: #4B5563; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

    /* Sensor List Card */
    .sensor-card {
      background: #FFFFFF; border-radius: 16px; padding: 18px; margin-bottom: 12px;
      border: 1px solid #E5E7EB; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .sensor-card:hover { background: #F9FAFB; }
    .sensor-card:active { transform: scale(0.98); }
    .sensor-card.alert-border { border-color: #EF4444; background: #FEF2F2; }
    .sensor-left { display: flex; align-items: center; gap: 12px; }
    .sensor-icon { font-size: 32px; }
    .sensor-name { font-size: 18px; font-weight: bold; color: #111827; }
    .sensor-id-text { font-size: 11px; color: #2563EB; font-family: monospace; margin-top: 2px; }
    .sensor-right { text-align: right; }
    .sensor-temp { font-size: 28px; font-weight: bold; color: #111827; }
    .sensor-temp.alert { color: #EF4444; }
    .sensor-badge {
      font-size: 11px; font-weight: bold; margin-top: 4px;
      padding: 2px 8px; border-radius: 6px; display: inline-block;
    }
    .badge-ok { background: #D1FAE5; color: #065F46; }
    .badge-alert { background: #FEE2E2; color: #991B1B; }
    .footer-text { text-align: center; color: #9CA3AF; font-size: 12px; margin-top: 20px; }

    /* ─── Detail View ─── */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }

    .back-btn {
      background: none; border: none; color: #2563EB; font-size: 14px;
      font-weight: bold; cursor: pointer; margin-bottom: 16px;
      font-family: 'Inter', sans-serif; padding: 0;
    }
    .detail-header { font-size: 28px; font-weight: bold; color: #111827; margin-bottom: 20px; }

    .card {
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
      border: 1px solid #E5E7EB; background: #FFFFFF;
      transition: background 0.5s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .card.alarm { animation: flash 1s infinite; }
    @keyframes flash { 0%,100% { background:#FFFFFF; } 50% { background:#FEE2E2; } }

    .card-title { color: #6B7280; font-size: 14px; margin-bottom: 16px; font-weight: bold; }
    .row { display: flex; justify-content: space-between; }
    .row + .row { margin-top: 16px; }
    .metric-box { flex: 1; }
    .metric-label { color: #6B7280; font-size: 12px; margin-bottom: 4px; }
    .metric-value { color: #111827; font-size: 24px; font-weight: bold; }
    .metric-value.small { font-size: 14px; }

    .warning-text {
      color: #991B1B; font-weight: bold; margin-top: 16px;
      text-align: center; background: #FEE2E2;
      padding: 8px; border-radius: 8px; font-size: 13px;
      display: none;
    }
    .warning-text.show { display: block; }

    .action-btn {
      display: block; border-radius: 12px; padding: 16px;
      text-align: center; margin-bottom: 12px; cursor: pointer;
      color: #fff; font-size: 16px; font-weight: bold;
      text-decoration: none; transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.85; }
    .action-btn.blue { background: #3B82F6; }
    .action-btn.green { background: #10B981; }

    /* Developer Simulator Panel Styles */
    .dev-panel {
      margin-top: 20px; padding: 16px; background: #FFFFFF;
      border-radius: 16px; border: 1px dashed #D1D5DB;
    }
    .dev-panel-title { color: #6B7280; font-size: 12px; font-weight: bold; margin-bottom: 12px; }
    .dev-row { display: flex; justify-content: space-between; gap: 10px; }
    .dev-btn {
      flex: 1; background: #6B7280; padding: 12px; border: none; border-radius: 8px;
      align-items: center; color: #fff; font-weight: bold; font-family: 'Inter', sans-serif;
      cursor: pointer; font-size: 14px; transition: opacity 0.2s;
    }
    .dev-btn:hover { opacity: 0.9; }
    .dev-btn.blue { background: #3B82F6; }
    .dev-btn.red { background: #EF4444; }
    .dev-btn.orange { background: #F59E0B; }

    /* Inputs styling */
    .input-field {
      width: 100%; padding: 10px; border: 1px solid #E5E7EB;
      border-radius: 8px; font-family: 'Inter', sans-serif;
      font-size: 14px; color: #111827; background: #F3F4F6;
      outline: none; margin-top: 4px;
    }
  </style>
</head>
<body>
  <!-- LIST VIEW -->
  <div class="page list-view" id="listView">
    <div class="header">🏭 Ground Up</div>
    <div class="subheader">Cold Room Monitoring</div>
    <div class="section-title">All Sensors (3)</div>
    <div id="sensorList"></div>
    <div class="footer-text">Tap a sensor to view live details</div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="page detail-view" id="detailView">
    <button class="back-btn" onclick="showList()">← Back to Sensors</button>
    <div class="detail-header" id="detailHeader"></div>
    
    <!-- Metrics Card -->
    <div class="card" id="detailCard">
      <div class="card-title" id="detailTitle"></div>
      <div class="row">
        <div class="metric-box">
          <div class="metric-label">Temperature</div>
          <div class="metric-value" id="dTemp">--</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Humidity</div>
          <div class="metric-value" id="dHum">--</div>
        </div>
      </div>
      <div class="row">
        <div class="metric-box">
          <div class="metric-label">Battery</div>
          <div class="metric-value" id="dBat">--</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Last Updated</div>
          <div class="metric-value small" id="dTime">--</div>
        </div>
      </div>
      <div class="warning-text" id="dWarn">⚠️ TEMPERATURE ALERT</div>
    </div>
    
    <a class="action-btn blue" id="dJsonLink" target="_blank">View 7-Day Analytics</a>
    <a class="action-btn green" id="dCsvLink" target="_blank">Export CSV Audit Log</a>

    <!-- Thresholds Configuration Panel -->
    <div class="card" style="margin-top: 20px;">
      <div class="card-title">Thresholds Configuration</div>
      <div class="row">
        <div class="metric-box" style="margin-right: 12px;">
          <div class="metric-label">Min Temp (°C)</div>
          <input type="number" step="0.5" id="minInput" class="input-field" placeholder="None" />
        </div>
        <div class="metric-box">
          <div class="metric-label">Max Temp (°C)</div>
          <input type="number" step="0.5" id="maxInput" class="input-field" placeholder="None" />
        </div>
      </div>
      <button class="action-btn blue" style="margin-top: 16px; padding: 12px; font-size: 14px; margin-bottom: 0;" onclick="saveThresholds()">Save Thresholds</button>
    </div>

    <!-- Simulator Panel -->
    <div class="dev-panel">
      <div class="dev-panel-title">Developer Simulator Panel</div>
      <div class="dev-row">
        <button class="dev-btn" onclick="setMockMode('normal')">Normal</button>
        <button class="dev-btn blue" onclick="setMockMode('ice')">Ice (-3°C)</button>
      </div>
      <div class="dev-row" style="margin-top: 10px;">
        <button class="dev-btn red" onclick="setMockMode('warm')">Warm (8°C)</button>
        <button class="dev-btn orange" onclick="setMockMode('failover')">Failover</button>
      </div>
    </div>
  </div>

  <script>
    const DEVICES = [
      { id:'a4b002884e', name:'Device 1',     icon:'❄️' },
      { id:'a4b002898f', name:'Miso Room',     icon:'🍶' },
      { id:'a4b0028991', name:'Vinegar Room',  icon:'🫗' },
    ];
    const API = window.location.origin;
    let currentDevice = null;
    let detailInterval = null;
    let tempMin = null;
    let tempMax = null;

    // Build sensor list cards
    function buildSensorCard(d) {
      return `
      <div class="sensor-card" id="sc-${d.id}" onclick="showDetail('${d.id}')">
        <div class="sensor-left">
          <div class="sensor-icon">${d.icon}</div>
          <div>
            <div class="sensor-name">${d.name}</div>
            <div class="sensor-id-text">${d.id}</div>
          </div>
        </div>
        <div class="sensor-right">
          <div class="sensor-temp" id="st-${d.id}">--</div>
          <div class="sensor-badge badge-ok" id="sb-${d.id}">✅ OK</div>
        </div>
      </div>`;
    }
    document.getElementById('sensorList').innerHTML = DEVICES.map(buildSensorCard).join('');

    // Poll list view
    async function pollList() {
      for (const d of DEVICES) {
        try {
          // Fetch thresholds
          const threshRes = await fetch(`${API}/sensors/device/${d.id}/sensors`);
          const sensors = await threshRes.json();
          const tempSensor = sensors.find(s => s.type === 'temperature');
          const tMin = tempSensor ? tempSensor.min_threshold : null;
          const tMax = tempSensor ? tempSensor.max_threshold : null;

          // Fetch telemetry
          const res = await fetch(`${API}/sensors/device/${d.id}/telemetry?days=1`);
          const data = await res.json();
          if (data && data.length > 0) {
            const temp = parseFloat(data[0].temperature);
            const el = document.getElementById(`st-${d.id}`);
            const badge = document.getElementById(`sb-${d.id}`);
            const card = document.getElementById(`sc-${d.id}`);
            el.textContent = temp + '°C';

            let isAlert = false;
            if (tMin !== null && temp < tMin) isAlert = true;
            if (tMax !== null && temp > tMax) isAlert = true;

            if (isAlert) {
              el.classList.add('alert');
              badge.className = 'sensor-badge badge-alert';
              badge.textContent = '⚠️ ALERT';
              card.classList.add('alert-border');
            } else {
              el.classList.remove('alert');
              badge.className = 'sensor-badge badge-ok';
              badge.textContent = '✅ OK';
              card.classList.remove('alert-border');
            }
          }
        } catch(e) {}
      }
    }
    pollList();
    const listInterval = setInterval(pollList, 10000);

    // Fetch thresholds for detail view
    async function fetchActiveThresholds(deviceId) {
      try {
        const res = await fetch(`${API}/sensors/device/${deviceId}/sensors`);
        const sensors = await res.json();
        const tempSensor = sensors.find(s => s.type === 'temperature');
        if (tempSensor) {
          tempMin = tempSensor.min_threshold;
          tempMax = tempSensor.max_threshold;
          document.getElementById('minInput').value = tempMin !== null ? tempMin : '';
          document.getElementById('maxInput').value = tempMax !== null ? tempMax : '';
        }
      } catch (e) {}
    }

    // Save thresholds
    async function saveThresholds() {
      if (!currentDevice) return;
      const minVal = document.getElementById('minInput').value;
      const maxVal = document.getElementById('maxInput').value;
      const body = {
        temp_min: minVal !== '' ? parseFloat(minVal) : null,
        temp_max: maxVal !== '' ? parseFloat(maxVal) : null
      };
      try {
        const res = await fetch(`${API}/sensors/device/${currentDevice.id}/thresholds`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          alert('Thresholds saved successfully!');
          await fetchActiveThresholds(currentDevice.id);
          pollDetail();
        }
      } catch (e) {
        alert('Failed to save thresholds');
      }
    }

    // Show detail
    async function showDetail(deviceId) {
      currentDevice = DEVICES.find(d => d.id === deviceId);
      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('active');
      document.getElementById('detailHeader').textContent = currentDevice.icon + ' ' + currentDevice.name + ' Monitor';
      document.getElementById('detailTitle').textContent = 'Live Metrics (Sensor: ' + currentDevice.id + ')';
      document.getElementById('dJsonLink').href = `/sensors/device/${currentDevice.id}/telemetry?days=7`;
      document.getElementById('dCsvLink').href = `/sensors/device/${currentDevice.id}/export?days=7`;
      
      await fetchActiveThresholds(currentDevice.id);
      pollDetail();
      detailInterval = setInterval(pollDetail, 5000);
    }

    function showList() {
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('detailView').classList.remove('active');
      if (detailInterval) clearInterval(detailInterval);
      pollList();
    }

    async function pollDetail() {
      if (!currentDevice) return;
      try {
        const res = await fetch(`${API}/sensors/device/${currentDevice.id}/telemetry?days=1`);
        const data = await res.json();
        if (data && data.length > 0) {
          const d = data[0];
          const temp = parseFloat(d.temperature);
          document.getElementById('dTemp').textContent = temp + '°C';
          document.getElementById('dHum').textContent = parseFloat(d.humidity) + '%';
          document.getElementById('dBat').textContent = parseFloat(d.battery_level) + '%';
          const ts = new Date(d.timestamp.endsWith('Z') ? d.timestamp : d.timestamp+'Z');
          document.getElementById('dTime').textContent = ts.toLocaleTimeString();

          const card = document.getElementById('detailCard');
          const warn = document.getElementById('dWarn');
          
          let isAlert = false;
          let alertMsg = "";
          if (tempMin !== null && temp < tempMin) {
            isAlert = true;
            alertMsg = `⚠️ TEMPERATURE ALERT: BELOW ${tempMin}°C`;
          } else if (tempMax !== null && temp > tempMax) {
            isAlert = true;
            alertMsg = `⚠️ TEMPERATURE ALERT: EXCEEDS ${tempMax}°C`;
          }

          if (isAlert) {
            card.classList.add('alarm');
            warn.textContent = alertMsg;
            warn.classList.add('show');
          } else {
            card.classList.remove('alarm');
            warn.classList.remove('show');
          }
        } else {
          // No recent data
          document.getElementById('dTemp').textContent = '--';
          document.getElementById('dHum').textContent = '--';
          document.getElementById('dBat').textContent = '--';
          document.getElementById('dTime').textContent = 'Offline';
          document.getElementById('detailCard').classList.remove('alarm');
          document.getElementById('dWarn').classList.remove('show');
        }
      } catch(e) {}
    }

    // Set mock mode for active device
    async function setMockMode(mode) {
      if (!currentDevice) return;
      try {
        await fetch(`${API}/sensors/device/${currentDevice.id}/mock`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode })
        });
        pollDetail();
      } catch (e) {
        console.error('Failed to set mock mode', e);
      }
    }
  </script>
</body>
</html>
