<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ground Up Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #111827;
      color: #fff;
      min-height: 100vh;
    }

    .page { padding: 20px; max-width: 500px; margin: 0 auto; }

    .header { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 4px; }
    .subheader { font-size: 14px; color: #9CA3AF; margin-bottom: 20px; }

    /* Card */
    .card {
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
      border: 1px solid #374151;
      background: #1F2937;
      transition: background 0.5s ease;
    }
    .card.alarm {
      animation: flash 1s infinite;
    }
    @keyframes flash {
      0%, 100% { background: #1F2937; }
      50% { background: #7F1D1D; }
    }

    .card-title { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 2px; }
    .sensor-id { color: #60A5FA; font-size: 11px; font-family: monospace; margin-bottom: 16px; }

    .row { display: flex; justify-content: space-between; }
    .row + .row { margin-top: 16px; }

    .metric-box { flex: 1; }
    .metric-label { color: #9CA3AF; font-size: 12px; margin-bottom: 4px; }
    .metric-value { color: #fff; font-size: 24px; font-weight: bold; }
    .metric-value.small { font-size: 14px; }

    .warning-text {
      color: #FECACA; font-weight: bold; margin-top: 16px;
      text-align: center; background: #991B1B;
      padding: 8px; border-radius: 8px; font-size: 13px;
      display: none;
    }
    .warning-text.show { display: block; }

    .export-btn {
      margin-top: 16px; background: #374151; border-radius: 10px;
      padding: 10px; text-align: center; cursor: pointer;
      color: #9CA3AF; font-size: 13px; font-weight: bold;
      text-decoration: none; display: block;
      transition: background 0.2s;
    }
    .export-btn:hover { background: #4B5563; }

    .action-btn {
      background: #3B82F6; border-radius: 12px; padding: 16px;
      text-align: center; margin-bottom: 12px; cursor: pointer;
      color: #fff; font-size: 16px; font-weight: bold;
      text-decoration: none; display: block;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #2563EB; }
    .action-btn.green { background: #10B981; }
    .action-btn.green:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">🏭 Ground Up Monitor</div>
    <div class="subheader">3 devices · Threshold 4.0°C</div>

    <div id="cards"></div>

    <a class="action-btn" href="/sensors/device/a4b002884e/telemetry?days=7" target="_blank">📊 View 7-Day Analytics</a>
  </div>

  <script>
    const DEVICES = [
      { id: 'a4b002884e', name: 'Device 1',     icon: '❄️' },
      { id: 'a4b002898f', name: 'Miso Room',     icon: '🍶' },
      { id: 'a4b0028991', name: 'Vinegar Room',  icon: '🫗' },
    ];
    const API = window.location.origin;

    function buildCard(d) {
      return `
      <div class="card" id="card-${d.id}">
        <div class="card-title">${d.icon} ${d.name} — Live</div>
        <div class="sensor-id">Sensor: ${d.id}</div>
        <div class="row">
          <div class="metric-box">
            <div class="metric-label">Temperature</div>
            <div class="metric-value" id="temp-${d.id}">--</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">Humidity</div>
            <div class="metric-value" id="hum-${d.id}">--</div>
          </div>
        </div>
        <div class="row">
          <div class="metric-box">
            <div class="metric-label">Battery</div>
            <div class="metric-value" id="bat-${d.id}">--</div>
          </div>
          <div class="metric-box">
            <div class="metric-label">Last Updated</div>
            <div class="metric-value small" id="time-${d.id}">--</div>
          </div>
        </div>
        <div class="warning-text" id="warn-${d.id}">⚠️ TEMPERATURE ALERT: EXCEEDS 4.0°C</div>
        <a class="export-btn" href="/sensors/device/${d.id}/export?days=7" target="_blank">📥 Export CSV</a>
      </div>`;
    }

    document.getElementById('cards').innerHTML = DEVICES.map(buildCard).join('');

    async function poll(d) {
      try {
        const res = await fetch(`${API}/sensors/device/${d.id}/telemetry?days=1`);
        if (!res.ok) return;
        const data = await res.json();
        if (!data || data.length === 0) return;
        const latest = data[0];
        const temp = parseFloat(latest.temperature);
        const hum = parseFloat(latest.humidity);
        const bat = parseFloat(latest.battery_level);
        const ts = new Date(latest.timestamp.endsWith('Z') ? latest.timestamp : latest.timestamp + 'Z');

        document.getElementById(`temp-${d.id}`).textContent = temp + '°C';
        document.getElementById(`hum-${d.id}`).textContent = hum + '%';
        document.getElementById(`bat-${d.id}`).textContent = bat + '%';
        document.getElementById(`time-${d.id}`).textContent = ts.toLocaleTimeString();

        const card = document.getElementById(`card-${d.id}`);
        const warn = document.getElementById(`warn-${d.id}`);
        if (temp > 4.0) {
          card.classList.add('alarm');
          warn.classList.add('show');
        } else {
          card.classList.remove('alarm');
          warn.classList.remove('show');
        }
      } catch(e) {}
    }

    function refresh() { DEVICES.forEach(poll); }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
