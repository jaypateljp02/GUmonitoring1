<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ground Up — Cold Room Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 20px 24px;
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
    }
    .header h1 {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-right: 6px;
      animation: pulse-green 2s infinite;
    }
    .status-dot.error { background: #ef4444; animation: pulse-red 1s infinite; }
    @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* Summary Bar */
    .summary-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
      margin-bottom: 16px;
    }
    .summary-item {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 14px; padding: 14px; text-align: center;
    }
    .summary-item .count {
      font-size: 28px; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .summary-item .label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 600; }

    /* Device Card */
    .device-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      transition: all 0.5s ease;
      position: relative; overflow: hidden;
    }
    .device-card::before {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 22px; z-index: -1;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #3b82f6);
      background-size: 200% 200%;
      animation: gradient-border 3s ease infinite;
      opacity: 0.2;
    }
    @keyframes gradient-border { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .device-card.alarm {
      border-color: #ef4444;
      animation: alarm-flash 1s infinite;
    }
    .device-card.alarm::before { background: #ef4444; opacity: 0.4; }
    @keyframes alarm-flash {
      0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
    }

    .card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .room-name { font-size: 16px; font-weight: 800; color: #f1f5f9; }
    .room-icon { font-size: 22px; }
    .sensor-id { font-size: 10px; color: #3b82f6; font-family: monospace; }

    .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .metric {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #1e293b;
      border-radius: 12px; padding: 12px 8px;
      text-align: center;
    }
    .metric-icon { font-size: 18px; margin-bottom: 4px; }
    .metric-value {
      font-size: 24px; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .metric-value.danger {
      background: linear-gradient(135deg, #fca5a5, #ef4444);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .metric-label { font-size: 9px; color: #64748b; margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-unit { font-size: 14px; font-weight: 500; }

    .alert-banner {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      border: 1px solid #ef4444;
      border-radius: 10px; padding: 8px 12px;
      margin-top: 12px; text-align: center;
      font-weight: 700; font-size: 11px; color: #fecaca;
      display: none;
      animation: alert-pulse 0.8s infinite alternate;
    }
    .alert-banner.show { display: block; }
    @keyframes alert-pulse { from { opacity: 0.8; } to { opacity: 1; } }

    .card-time {
      text-align: right; font-size: 10px; color: #475569; margin-top: 10px;
    }

    .updated-time {
      text-align: center; font-size: 11px; color: #475569;
      margin-top: 16px; padding-bottom: 30px;
    }

    .shimmer { animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏭 Ground Up — Cold Room Monitor</h1>
    <div class="sub"><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></div>
  </div>

  <div class="container">
    <!-- Summary -->
    <div class="summary-bar">
      <div class="summary-item">
        <div class="count" id="totalDevices">3</div>
        <div class="label">Devices</div>
      </div>
      <div class="summary-item">
        <div class="count" id="onlineCount">-</div>
        <div class="label">Online</div>
      </div>
      <div class="summary-item">
        <div class="count" id="alertCount" style="background: linear-gradient(135deg, #fca5a5, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">-</div>
        <div class="label">Alerts</div>
      </div>
    </div>

    <!-- Device Cards will be injected here -->
    <div id="devicesContainer"></div>

    <div class="updated-time" id="updatedTime">Waiting for first reading...</div>
  </div>

  <script>
    const DEVICES = [
      { id: 'a4b002884e', name: 'Device 1', icon: '❄️' },
      { id: 'a4b002898f', name: 'Miso Room', icon: '🍶' },
      { id: 'a4b0028991', name: 'Vinegar Room', icon: '🫗' },
    ];
    const API_BASE = window.location.origin;
    const TEMP_ALERT_THRESHOLD = 4.0;

    // Create card HTML for each device
    function createDeviceCard(device) {
      return `
        <div class="device-card" id="card-${device.id}">
          <div class="card-header">
            <div>
              <div class="room-name">${device.icon} ${device.name}</div>
              <div class="sensor-id">${device.id}</div>
            </div>
            <div class="room-icon shimmer" id="status-icon-${device.id}">📡</div>
          </div>
          <div class="metrics-row">
            <div class="metric">
              <div class="metric-icon">🌡️</div>
              <div class="metric-value" id="temp-${device.id}">--</div>
              <div class="metric-label">Temp</div>
            </div>
            <div class="metric">
              <div class="metric-icon">💧</div>
              <div class="metric-value" id="hum-${device.id}">--</div>
              <div class="metric-label">Humidity</div>
            </div>
            <div class="metric">
              <div class="metric-icon">🔋</div>
              <div class="metric-value" id="bat-${device.id}">--</div>
              <div class="metric-label">Battery</div>
            </div>
          </div>
          <div class="alert-banner" id="alert-${device.id}">⚠️ TEMPERATURE ALERT: EXCEEDS ${TEMP_ALERT_THRESHOLD}°C</div>
          <div class="card-time" id="time-${device.id}">Waiting...</div>
        </div>
      `;
    }

    // Inject all device cards
    const container = document.getElementById('devicesContainer');
    container.innerHTML = DEVICES.map(d => createDeviceCard(d)).join('');

    // Fetch telemetry for a single device
    async function fetchDeviceTelemetry(device) {
      try {
        const res = await fetch(`${API_BASE}/sensors/device/${device.id}/telemetry?days=1`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data && data.length > 0) {
          const latest = data[0];
          const temp = parseFloat(latest.temperature);
          const hum = parseFloat(latest.humidity);
          const bat = parseFloat(latest.battery_level);

          document.getElementById(`temp-${device.id}`).innerHTML = `${temp}<span class="metric-unit">°C</span>`;
          document.getElementById(`hum-${device.id}`).innerHTML = `${hum}<span class="metric-unit">%</span>`;
          document.getElementById(`bat-${device.id}`).innerHTML = `${bat}<span class="metric-unit">%</span>`;

          const ts = new Date(latest.timestamp.endsWith('Z') ? latest.timestamp : latest.timestamp + 'Z');
          document.getElementById(`time-${device.id}`).textContent = `Updated: ${ts.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

          // Alarm logic
          const card = document.getElementById(`card-${device.id}`);
          const alertEl = document.getElementById(`alert-${device.id}`);
          const tempEl = document.getElementById(`temp-${device.id}`);

          if (temp > TEMP_ALERT_THRESHOLD) {
            card.classList.add('alarm');
            alertEl.classList.add('show');
            tempEl.classList.add('danger');
            return { online: true, alarm: true };
          } else {
            card.classList.remove('alarm');
            alertEl.classList.remove('show');
            tempEl.classList.remove('danger');
            return { online: true, alarm: false };
          }
        }
        return { online: false, alarm: false };
      } catch (err) {
        console.error(`Error fetching ${device.name}:`, err);
        document.getElementById(`time-${device.id}`).textContent = 'Connection lost';
        return { online: false, alarm: false };
      }
    }

    // Fetch all devices
    async function fetchAll() {
      let onlineCount = 0;
      let alertCount = 0;

      for (const device of DEVICES) {
        const result = await fetchDeviceTelemetry(device);
        if (result.online) onlineCount++;
        if (result.alarm) alertCount++;
      }

      document.getElementById('onlineCount').textContent = onlineCount;
      document.getElementById('alertCount').textContent = alertCount;

      if (onlineCount > 0) {
        document.getElementById('statusDot').classList.remove('error');
        document.getElementById('statusText').textContent = `Live — ${onlineCount} of ${DEVICES.length} devices online`;
      } else {
        document.getElementById('statusDot').classList.add('error');
        document.getElementById('statusText').textContent = 'Connection lost';
      }

      document.getElementById('updatedTime').textContent = `Last sync: ${new Date().toLocaleString('en-IN')}`;
    }

    // Poll every 10 seconds
    fetchAll();
    setInterval(fetchAll, 10000);
  </script>
</body>
</html>
